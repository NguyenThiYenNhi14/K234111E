<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<div class="book-edit-container">

  <div class="edit-header">
    <h2><i class="fa-solid fa-pen-to-square"></i> Edit Book</h2>
    <button (click)="goBack()" class="btn-back">
      <i class="fa-solid fa-arrow-left"></i> Back
    </button>
  </div>

  <div *ngIf="isLoading" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>Loading...</p>
  </div>

  <form *ngIf="!isLoading" (ngSubmit)="onSubmit()">
    <div class="form-layout">

      <!-- LEFT: Image -->
      <div class="left-column">
        <div class="form-section">
          <h3 class="section-title"><i class="fa-solid fa-image"></i> Book Cover</h3>
          <div class="image-upload-area">
            <div class="image-preview" *ngIf="previewUrl">
              <img [src]="previewUrl" alt="Preview"/>
              <button type="button" class="btn-remove-img" (click)="removeImage()">
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>
            <div class="upload-placeholder" *ngIf="!previewUrl">
              <i class="fa-solid fa-cloud-arrow-up"></i>
              <p>No image selected</p>
            </div>
            <label class="btn-upload">
              <i class="fa-solid fa-upload"></i>
              {{ previewUrl ? 'Change Image' : 'Upload Image' }}
              <input type="file" (change)="onFileSelected($event)" accept="image/*" style="display:none"/>
            </label>
          </div>
        </div>

        <div class="info-card">
          <h4><i class="fa-solid fa-info-circle"></i> Book Info</h4>
          <div class="info-item">
            <span class="info-label">Book ID:</span>
            <span class="info-value">{{ book.id }}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Created:</span>
            <span class="info-value">{{ book.createdAt | date:'short' }}</span>
          </div>
        </div>
      </div>

      <!-- RIGHT: Fields -->
      <div class="right-column">
        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-book"></i> Title <span class="required">*</span></label>
          <input type="text" class="form-input" [(ngModel)]="book.title" name="title" placeholder="Enter book title" required/>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-user-pen"></i> Author</label>
          <input type="text" class="form-input" [(ngModel)]="book.author" name="author" placeholder="Enter author name"/>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-dollar-sign"></i> Price <span class="required">*</span></label>
          <input type="number" class="form-input" [(ngModel)]="book.price" name="price" placeholder="0.00" step="0.01" min="0" required/>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-cancel" (click)="goBack()">
            <i class="fa-solid fa-xmark"></i> Cancel
          </button>
          <button type="submit" class="btn btn-save">
            <i class="fa-solid fa-floppy-disk"></i> Save Changes
          </button>
        </div>
      </div>

    </div>
  </form>

</div>
