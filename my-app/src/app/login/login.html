<div class="login-container">
  <h2>🔐 Đăng Nhập</h2>

  <div *ngIf="errMessage" class="alert alert-danger">{{ errMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <div class="form-group">
    <label>Username:</label>
    <input type="text" [(ngModel)]="username" placeholder="Nhập username..." class="form-control" />
  </div>

  <div class="form-group">
    <label>Password:</label>
    <input type="password" [(ngModel)]="password" placeholder="Nhập password..." class="form-control" />
  </div>

  <button (click)="login()" [disabled]="isLoading" class="btn btn-primary">
    {{ isLoading ? 'Đang đăng nhập...' : 'Đăng Nhập' }}
  </button>

  <button (click)="goRegister()" class="btn btn-secondary">
    Chưa có tài khoản? Đăng Ký
  </button>
</div>
