<div class="cart-container">
  <h2 class="cart-title">Shopping cart</h2>

  <div *ngIf="errMessage" class="alert-error">{{ errMessage }}</div>
  <div *ngIf="successMessage" class="alert-success">{{ successMessage }}</div>

  <div *ngIf="cart.length === 0" class="cart-empty">
    Your cart is empty. <a (click)="continueShopping()" class="link">Continue shopping</a>
  </div>

  <div *ngIf="cart.length > 0">
    <table class="cart-table">
      <thead>
        <tr>
          <th>Remove</th>
          <th>SKU</th>
          <th>Image</th>
          <th>Product(s)</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cart; let i = index">
          <td class="td-center">
            <input type="checkbox" [(ngModel)]="checkedItems[i]" />
          </td>
          <td class="td-sku">{{ item.sku }}</td>
          <td class="td-img">
            <img [src]="parse_image(item.image)" [alt]="item.name" width="60" height="60" style="object-fit:contain" />
          </td>
          <td class="td-name">{{ item.name }}</td>
          <td class="td-price">${{ item.price | number:'1.2-2' }}</td>
          <td class="td-qty">
            <input type="number" [(ngModel)]="item.qty" min="1" class="qty-input" />
          </td>
          <td class="td-total">${{ getTotal(item) | number:'1.2-2' }}</td>
        </tr>
      </tbody>
    </table>

    <div class="cart-footer">
      <div class="grand-total">Grand Total: <strong>${{ getGrandTotal() | number:'1.2-2' }}</strong></div>
      <div class="cart-actions">
        <button class="btn-update" (click)="updateCart()">Update shopping cart</button>
        <button class="btn-continue" (click)="continueShopping()">Continue shopping</button>
      </div>
    </div>
  </div>
</div>
