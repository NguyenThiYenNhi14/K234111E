<div class="register-container">
  <h2>📝 Đăng Ký Tài Khoản</h2>

  <div *ngIf="errMessage" class="alert alert-danger">{{ errMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <div class="form-group">
    <label>Username:</label>
    <input type="text" [(ngModel)]="username" placeholder="Nhập username..." class="form-control" />
  </div>

  <div class="form-group">
    <label>Password:</label>
    <input type="password" [(ngModel)]="password" placeholder="Ít nhất 6 ký tự..." class="form-control" />
  </div>

  <div class="form-group">
    <label>Xác nhận Password:</label>
    <input type="password" [(ngModel)]="confirmPassword" placeholder="Nhập lại password..." class="form-control" />
  </div>

  <button (click)="register()" [disabled]="isLoading" class="btn btn-success">
    {{ isLoading ? 'Đang đăng ký...' : 'Đăng Ký' }}
  </button>

  <button (click)="goLogin()" class="btn btn-secondary">
    Đã có tài khoản? Đăng Nhập
  </button>
</div>
